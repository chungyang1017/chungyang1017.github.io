<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>葉崇揚 Chung-Yang Yeh</title>
  <meta name="description" content="葉崇揚（Chung-Yang Yeh） ・ 學術、攝影、教學。" />
  <link rel="alternate" hreflang="zh-Hant" href="index.html" />
  <link rel="alternate" hreflang="en" href="index-en.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Noto+Serif+JP:wght@200;300;400;500&family=Noto+Serif+TC:wght@200;300;400&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Long+Cang&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --sumi: #15110d; --sumi-soft: #2c2622;
      --ink-mid: #5a534d; --ink-mute: #9a938c;
      --washi: #f4efe5; --washi-deep: #e8e1d3; --washi-soft: #fbf7ee;
      --shu: #b13a2a; --kin: #a98146;
      --line: rgba(21,17,13,0.14); --line-soft: rgba(21,17,13,0.07);
      --jp: 'Noto Serif JP', 'Noto Serif TC', 'Hiragino Mincho ProN', serif;
      --brush: 'Noto Serif TC', 'Noto Serif JP', serif;
      --display: 'Cormorant Garamond', 'Noto Serif TC', serif;
      --sans: 'Inter', 'Helvetica Neue', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans); background: var(--washi); color: var(--sumi);
      -webkit-font-smoothing: antialiased; line-height: 1.7;
      background-image:
        radial-gradient(rgba(169,129,70,0.035) 1px, transparent 1px),
        radial-gradient(rgba(21,17,13,0.022) 1px, transparent 1px);
      background-size: 28px 28px, 17px 17px; background-position: 0 0, 14px 14px;
      display: flex; flex-direction: column; min-height: 100vh;
    }

    .top {
      flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
      padding: 2rem 2.5rem 0;
    }
    .top-mark { font-family: var(--jp); font-size: 0.85rem; color: var(--ink-mid); letter-spacing: 0.6em; }
    .top-mark::before { content: ''; display: inline-block; width: 18px; height: 1px; background: var(--shu); vertical-align: middle; margin-right: 1.2rem; transform: translateY(-2px); }
    .lang-toggle { display: flex; align-items: center; gap: 0.6rem; font-size: 0.7rem; letter-spacing: 0.18em; }
    .lang-toggle .current { color: var(--sumi); font-weight: 500; }
    .lang-toggle .sep { color: var(--ink-mute); opacity: 0.4; }
    .lang-toggle a { color: var(--ink-mute); text-decoration: none; transition: color 0.2s; }
    .lang-toggle a:hover { color: var(--shu); }

    main {
      flex: 1; display: grid; grid-template-columns: 1fr 1.4fr; gap: 4rem;
      padding: 3rem 4rem 5rem; max-width: 1280px; margin: 0 auto; width: 100%; align-items: center;
    }

    .name-block { position: relative; padding-left: 1.5rem; }
    .name-block::before { content: ''; position: absolute; left: 0; top: 0.5rem; width: 1px; height: 100%; background: var(--line); }
    .name-block::after { content: ''; position: absolute; left: -3px; top: 0.85rem; width: 7px; height: 7px; background: var(--shu); border-radius: 50%; }
    .eyebrow { font-family: var(--display); font-style: italic; font-size: 0.92rem; color: var(--ink-mid); letter-spacing: 0.14em; margin-bottom: 2rem; }
    .name-cn { font-family: var(--jp); font-weight: 200; font-size: clamp(3.4rem, 6vw, 5.4rem); line-height: 1; letter-spacing: 0.18em; color: var(--sumi); margin-bottom: 1.2rem; }
    .name-en { font-family: var(--display); font-style: italic; font-weight: 300; font-size: clamp(1.1rem, 1.6vw, 1.45rem); color: var(--ink-mid); letter-spacing: 0.05em; margin-bottom: 2.5rem; }
    .role { font-family: var(--jp); font-weight: 300; font-size: 0.92rem; color: var(--sumi); letter-spacing: 0.18em; line-height: 2.1; }
    .role .role-en { display: block; font-family: var(--display); font-style: italic; font-size: 0.88rem; color: var(--ink-mute); letter-spacing: 0.04em; margin-top: 0.4rem; }

    .doors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; position: relative; }
    .doors::before { content: ''; position: absolute; top: -2.5rem; left: 0; width: 60px; height: 1px; background: var(--sumi); opacity: 0.85; }

    .door {
      position: relative; aspect-ratio: 3 / 4.4;
      background: var(--washi-soft); border: 1px solid var(--line);
      text-decoration: none; color: var(--sumi);
      display: flex; flex-direction: column; overflow: hidden;
      transition: transform 0.5s cubic-bezier(.2,.7,.2,1), border-color 0.5s ease, background 0.5s ease;
    }
    .door:nth-child(1) { background: var(--washi-soft); }
    .door:nth-child(2) { background: var(--washi); }
    .door:nth-child(3) { background: var(--washi-deep); }
    .door:hover { transform: translateY(-6px); border-color: var(--shu); }
    .door.disabled { pointer-events: none; opacity: 0.55; }

    .door::before { content: ''; position: absolute; inset: 12px; border: 1px solid rgba(169,129,70,0.22); pointer-events: none; }
    .door::after { content: ''; position: absolute; top: 18%; right: -8%; width: 70%; height: 60%; background: radial-gradient(ellipse at 35% 50%, rgba(21,17,13,0.05) 0%, transparent 65%); pointer-events: none; z-index: 0; }

    .door-num { position: absolute; top: 1.4rem; left: 1.4rem; font-family: var(--display); font-style: italic; font-size: 0.72rem; color: var(--ink-mute); letter-spacing: 0.14em; z-index: 2; }
    .door-num::before { content: ''; display: inline-block; width: 14px; height: 1px; background: var(--shu); vertical-align: middle; margin-right: 0.4rem; }

    .door-status { position: absolute; top: 1.4rem; right: 1.4rem; font-size: 0.6rem; letter-spacing: 0.18em; color: var(--ink-mute); padding: 0.2rem 0.55rem; border: 1px solid var(--line); text-transform: uppercase; z-index: 2; }
    .door-status.live { color: var(--shu); border-color: rgba(177,58,42,0.4); }

    .door-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem 5rem; text-align: center; position: relative; z-index: 1; }
    .door-brush {
      font-family: var(--brush);
      font-weight: 400;
      font-size: clamp(1.8rem, 2.6vw, 2.4rem);
      line-height: 1.15;
      color: var(--sumi);
      margin: 0;
      letter-spacing: 0.06em;
      writing-mode: vertical-rl;
      transform: rotate(-1deg);
      transition: transform 0.6s cubic-bezier(.2,.7,.2,1);
      user-select: none;
    }
    .door-content { padding: 4.5rem 1rem 5.5rem !important; }
    .door-brush { font-weight: 200; }
    .door:hover .door-brush { transform: rotate(-1deg) translateY(-3px); }

    .door-meta { position: absolute; left: 0; right: 0; bottom: 1.6rem; display: flex; flex-direction: column; align-items: center; gap: 0.35rem; z-index: 2; }
    .door-jp { font-family: var(--jp); font-size: 0.85rem; letter-spacing: 0.22em; color: var(--sumi); }
    .door-jp .romaji { color: var(--ink-mute); font-style: italic; font-family: var(--display); letter-spacing: 0.06em; margin-left: 0.5rem; font-size: 0.78rem; }
    .door-en { font-family: var(--display); font-style: italic; font-size: 0.85rem; color: var(--ink-mid); letter-spacing: 0.06em; display: flex; align-items: baseline; gap: 0.3rem; transition: color 0.3s ease; }
    .door-en .arrow { font-style: normal; font-family: var(--sans); transition: transform 0.4s ease; }
    .door:hover .door-en { color: var(--shu); }
    .door:hover .door-en .arrow { transform: translateX(4px); }

    footer {
      flex-shrink: 0; padding: 1.75rem 2.5rem; border-top: 1px solid var(--line); background: var(--washi);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem;
      font-size: 0.72rem; color: var(--ink-mute); letter-spacing: 0.06em;
    }
    footer .links a { color: var(--ink-mid); text-decoration: none; margin: 0 0.35rem; transition: color 0.2s; }
    footer .links a:hover { color: var(--shu); }
    footer .sep { color: var(--ink-mute); opacity: 0.4; margin: 0 0.4rem; }

    @media (max-width: 1024px) {
      main { grid-template-columns: 1fr; gap: 3rem; padding: 2.5rem 2.5rem 4rem; }
      .doors::before { top: -1.5rem; }
    }
    @media (max-width: 720px) {
      .doors { grid-template-columns: 1fr; gap: 0.8rem; }
      .door { aspect-ratio: 16/8; }
      .door-brush { font-size: 5rem; }
      .top { padding: 1.5rem 1.5rem 0; flex-wrap: wrap; gap: 1rem; }
      main { padding: 2rem 1.5rem 3rem; }
      footer { padding: 1.5rem; flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header class="top">
  <span class="top-mark">葉 崇 揚</span>
  <div class="lang-toggle">
    <span class="current">中文</span>
    <span class="sep">／</span>
    <a href="index-en.html">EN</a>
  </div>

<main>

    <h1 class="name-cn">葉崇揚</h1>
    <p class="name-en">Chung-Yang Yeh</p>
    <p class="role">
      東吳大學社會學系 ・ 教授
      <span class="role-en">Professor of Social Policy ・ Soochow University, Taiwan</span>
    </p>
  </div>

  <nav class="doors" aria-label="Sections">
    <a href="academic-zh.html" class="door">
      <span class="door-num">No. 一</span>
      <span class="door-status live">Live</span>
      <div class="door-content"><span class="door-brush">學術</span></div>
      <div class="door-meta">
        <span class="door-jp">学術<span class="romaji">Gakujutsu</span></span>
        <span class="door-en">Academic <span class="arrow">→</span></span>
      </div>
    </a>

    <a href="photography.html" class="door">
      <span class="door-num">No. 二</span>
      <span class="door-status live">Live</span>
      <div class="door-content"><span class="door-brush">寫真</span></div>
      <div class="door-meta">
        <span class="door-jp">写真<span class="romaji">Shashin</span></span>
        <span class="door-en">Photography <span class="arrow">→</span></span>
      </div>
    </a>

    <a href="#" class="door disabled">
      <span class="door-num">No. 三</span>
      <span class="door-status">Soon</span>
      <div class="door-content"><span class="door-brush">教學</span></div>
      <div class="door-meta">
        <span class="door-jp">講義<span class="romaji">Kōgi</span></span>
        <span class="door-en">Teaching <span class="arrow">→</span></span>
      </div>
    </a>
  </nav>

<footer>
  <p>© 2025 ・ 葉崇揚 Chung-Yang Yeh ・ 東吳大學社會學系</p>
  <p class="links">

    <span class="sep">·</span>

</body>
</html>
