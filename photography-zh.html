<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>葉崇揚 ・ 縁側 ・ 寫真</title>
  <meta name="description" content="葉崇揚（Chung-Yang Yeh） ・ 寫真九系列：街頭、春信、青嵐、紅葉、雪明、潮騒、山水、Xpan、銀鹽。" />
  <link rel="alternate" hreflang="zh-Hant" href="photography-zh.html" />
  <link rel="alternate" hreflang="en" href="photography.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@300;400;500;600;700&family=Klee+One:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --engawa-bg: #e0d8c0;
      --engawa-paper: #f0ebd5;
      --moss: #3d5a3f;
      --accent: #c43838;
      --water: #5a7a8a;
      --ink: #1f1f1d;
      --line: rgba(31,31,29,0.18);
      --line-soft: rgba(31,31,29,0.10);
      --jp: 'Shippori Mincho', 'Noto Serif JP', 'Noto Serif TC', serif;
      --brush: 'Yuji Syuku', 'Shippori Mincho', serif;
      --hand: 'Klee One', cursive;
      --sans: 'Inter', 'Helvetica Neue', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--jp);
      background: var(--engawa-bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      line-height: 1.7;
      position: relative;
      overflow-x: hidden;
    }
    body.is-book-open { overflow: hidden; }

    /* Engawa wood floor (subtle background) */
    .engawa-floor {
      position: fixed; inset: 0;
      pointer-events: none;
      opacity: 0.06; z-index: 1;
    }

    /* Header */
    .top {
      position: sticky; top: 0; z-index: 50;
      background: rgba(224,216,192,0.93);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line-soft);
      padding: 14px 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-left { display: flex; align-items: center; gap: 16px; }
    .back { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; opacity: 0.55; text-decoration: none; color: var(--ink); }
    .top-sep { font-size: 11px; opacity: 0.3; }
    .name-block { display: inline-flex; align-items: baseline; gap: 8px; }
    .name-jp { font-family: var(--brush); font-size: 22px; letter-spacing: 0.1em; }
    .name-en { font-family: var(--sans); font-size: 13px; letter-spacing: 0.08em; opacity: 0.7; }
    .nav { display: flex; gap: 24px; font-size: 12px; letter-spacing: 0.25em; }
    .nav a { color: var(--ink); text-decoration: none; opacity: 0.5; padding-bottom: 4px; }
    .nav a.is-current { opacity: 1; border-bottom: 2px solid var(--accent); }
    .nav .nav-jp { font-size: 10px; opacity: 0.55; letter-spacing: 0.18em; margin-left: 2px; font-family: var(--jp); }
    .nav .lang { border-left: 1px solid var(--line); padding-left: 24px; font-family: var(--sans); }

    /* Hero */
    .hero {
      padding: 80px 60px 50px;
      position: relative; z-index: 2;
      border-bottom: 1px solid rgba(31,31,29,0.06);
    }
    .hero-inner { max-width: 1280px; margin: 0 auto; }
    .hero-eyebrow { font-size: 11px; letter-spacing: 0.5em; opacity: 0.5; margin-bottom: 16px; }
    .hero-title { margin: 0; font-family: var(--brush); font-size: 88px; font-weight: 400; line-height: 1; letter-spacing: 0.05em; }
    .hero-sub { margin-top: 12px; font-size: 14px; letter-spacing: 0.3em; opacity: 0.55; }
    .hero-desc { margin-top: 32px; font-size: 17px; line-height: 2; opacity: 0.82; max-width: 760px; }

    /* ── Series rows (9 categories top→bottom, each scrolls horizontally) ── */
    .series-rows { padding: 24px 0 80px; max-width: 1320px; margin: 0 auto; position: relative; z-index: 2; }
    .series-row { padding: 32px 0 28px; border-top: 1px solid rgba(31,31,29,0.16); }
    .series-row:first-child { border-top: none; padding-top: 16px; }
    .series-row-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px;
      padding: 0 60px 18px;
    }
    .series-row-title { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
    .series-row-jp { font-family: var(--brush); font-size: 34px; letter-spacing: 0.06em; line-height: 1; }
    .series-row-en {
      font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em;
      opacity: 0.5; text-transform: uppercase;
    }
    .series-row-meta {
      font-family: var(--sans); font-size: 11px; opacity: 0.55;
      letter-spacing: 0.2em; white-space: nowrap;
    }
    .series-row-meta .count-num { color: var(--accent); margin-right: 0.5em; }
    .series-row-meta .place { margin-left: 14px; }

    .series-row-scroll {
      display: flex; gap: 12px;
      overflow-x: auto; overflow-y: hidden;
      padding: 4px 60px 18px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-color: rgba(31,31,29,0.25) transparent;
    }
    .series-row-scroll::-webkit-scrollbar { height: 6px; }
    .series-row-scroll::-webkit-scrollbar-track { background: transparent; }
    .series-row-scroll::-webkit-scrollbar-thumb { background: rgba(31,31,29,0.20); border-radius: 3px; }
    .series-row-scroll::-webkit-scrollbar-thumb:hover { background: rgba(31,31,29,0.35); }

    .thumb {
      flex: 0 0 auto;
      height: 240px;
      background: rgba(31,31,29,0.08);
      border: none; padding: 0; margin: 0;
      cursor: pointer; position: relative;
      overflow: hidden;
      scroll-snap-align: start;
      transition: transform 0.3s ease;
    }
    .thumb img {
      height: 100%; width: auto;
      display: block; object-fit: cover;
      transition: transform 0.5s ease, filter 0.3s ease;
      filter: saturate(0.95);
    }
    .thumb:hover img { transform: scale(1.04); filter: saturate(1.05); }
    .thumb-num {
      position: absolute; left: 8px; bottom: 6px;
      font-family: var(--sans); font-size: 9px;
      letter-spacing: 0.18em; color: #f8f0dc;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      opacity: 0; transition: opacity 0.25s;
      pointer-events: none;
    }
    .thumb:hover .thumb-num { opacity: 0.9; }

    /* Footer */
    footer {
      border-top: 1px solid var(--line);
      padding: 32px 60px;
      max-width: 1280px; margin: 0 auto;
      display: flex; justify-content: space-between;
      font-size: 11px; opacity: 0.55; letter-spacing: 0.2em;
      font-family: var(--sans);
      position: relative; z-index: 2;
    }

    /* ── Lightbox (classic style) ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(15,12,9,0.96);
      display: none; align-items: center; justify-content: center;
      padding: 2rem;
      cursor: zoom-out;
    }
    .lightbox.is-open { display: flex; }
    .lightbox-figure {
      max-width: 96vw; max-height: 92vh;
      display: flex; flex-direction: row; align-items: center;
      gap: 2.5rem;
      cursor: default;
    }
    .lightbox-img {
      max-width: 70vw; max-height: 88vh;
      object-fit: contain; display: block;
      transition: opacity 0.25s ease;
    }
    .lightbox-img.is-flipping { opacity: 0; }
    .lightbox-caption {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      max-height: 80vh;
      color: rgba(232,226,212,0.78);
      display: flex; flex-direction: column;
      gap: 1.6rem; align-items: flex-start;
      padding: 1rem 0;
    }
    .lightbox-caption .lb-title {
      font-family: var(--jp); font-size: 14px;
      letter-spacing: 0.22em;
      color: rgba(232,226,212,0.5);
    }
    .lightbox-caption .lb-title .romaji {
      font-family: var(--sans); font-style: italic;
      font-size: 12px; color: rgba(232,226,212,0.4);
      letter-spacing: 0.08em;
      display: block; margin-top: 0.5rem;
      writing-mode: horizontal-tb;
    }
    .lightbox-caption .lb-haiku-jp {
      font-family: var(--jp); font-size: 1.4rem; line-height: 2.4;
      color: rgba(232,226,212,0.95);
      letter-spacing: 0.18em;
    }
    .lightbox-caption .lb-haiku-zh {
      font-family: var(--jp); font-size: 1.05rem; line-height: 2.1;
      color: rgba(232,226,212,0.65);
      letter-spacing: 0.14em;
    }
    .lightbox-close, .lightbox-prev, .lightbox-next {
      position: absolute;
      background: rgba(232,226,212,0.06);
      border: 1px solid rgba(232,226,212,0.18);
      color: rgba(232,226,212,0.9);
      width: 44px; height: 44px;
      font-size: 1.5rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .lightbox-close:hover, .lightbox-prev:hover, .lightbox-next:hover {
      background: rgba(196,56,56,0.25); border-color: rgba(196,56,56,0.5);
    }
    .lightbox-close { top: 1.25rem; right: 1.25rem; }
    .lightbox-prev { left: 1.25rem; top: 50%; transform: translateY(-50%); }
    .lightbox-next { right: 1.25rem; top: 50%; transform: translateY(-50%); }
    .lightbox-counter {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-family: var(--sans); font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: rgba(232,226,212,0.55);
    }

    /* Mobile */
    @media (max-width: 760px) {
      .top { padding: 12px 18px; flex-wrap: wrap; gap: 10px; }
      .top-left { gap: 10px; }
      .back { font-size: 10px; letter-spacing: 0.22em; }
      .name-jp { font-size: 16px; }
      .name-en { font-size: 8px; }
      .nav { gap: 14px; font-size: 10px; letter-spacing: 0.18em; }
      .nav a.nav-sub { display: none; }
      .nav .lang { padding-left: 14px; }

      .hero { padding: 50px 22px 32px; }
      .hero-title { font-size: 56px; }
      .hero-sub { font-size: 12px; }
      .hero-desc { font-size: 16px; margin-top: 24px; }

      .series-rows { padding: 14px 0 56px; }
      .series-row { padding: 22px 0 18px; }
      .series-row-head { padding: 0 22px 12px; gap: 10px; }
      .series-row-jp { font-size: 26px; }
      .series-row-en { font-size: 10px; letter-spacing: 0.22em; }
      .series-row-meta { font-size: 10px; }
      .series-row-meta .place { margin-left: 8px; }
      .series-row-scroll { padding: 4px 22px 14px; gap: 8px; }
      .thumb { height: 180px; }

      /* Lightbox: photo on top, caption below (horizontal text) */
      .lightbox { padding: 1rem; }
      .lightbox-figure { flex-direction: column; gap: 1rem; max-width: 96vw; max-height: 92vh; }
      .lightbox-img { max-width: 92vw; max-height: 65vh; }
      .lightbox-caption {
        writing-mode: horizontal-tb;
        flex-direction: column;
        max-height: none;
        text-align: center;
        padding: 0;
        gap: 0.6rem;
      }
      .lightbox-caption .lb-title { font-size: 11px; letter-spacing: 0.2em; }
      .lightbox-caption .lb-haiku-jp { font-size: 1.05rem; line-height: 1.85; letter-spacing: 0.1em; }
      .lightbox-caption .lb-haiku-zh { font-size: 0.95rem; line-height: 1.7; letter-spacing: 0.08em; }
      .lightbox-prev, .lightbox-next { width: 38px; height: 38px; font-size: 1.2rem; }
      .lightbox-counter { font-size: 0.7rem; bottom: 0.6rem; }

      footer { padding: 22px; flex-direction: column; gap: 8px; font-size: 10px; }
    }
  </style>
</head>
<body>

      <line x1="0" y1="0" x2="200" y2="0" stroke="#1f1f1d" stroke-width="0.6" />
      <line x1="80" y1="0" x2="80" y2="60" stroke="#1f1f1d" stroke-width="0.4" />

<header class="top">

  <nav class="nav" aria-label="Sections">

<section class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">第三室 · 縁側 ENGAWA</p>
    <h1 class="hero-title">寫真</h1>
    <p class="hero-sub">PHOTOGRAPHY · 9 系列 · 162 件作品</p>
    <p class="hero-desc">
      内と外の境。庭が一冊の本となる場所。<br/>
      於我而言，寫真是一種觀察與敘事的方法。將近三十年來，它與研究並行——一種以文字深入，一種以光影靠近。<br/>
      作品依九個系列分類：春信、青嵐、紅葉、雪明、潮聲、山水、街、Xpan、銀鹽。與其說是有計畫的專案，更像是被光與季節推著走的紀錄。它們合起來，是一份緩慢的觀看。
    </p>
  </div>
</section>

<div class="series-rows" id="series-rows"></div>

<footer>
  <span>YEH CHUNG-YANG</span>
  <span>令和八年 ・ 春 ・ 縁側</span>
</footer>

<!-- Classic lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
  <button class="lightbox-close" id="lightbox-close" type="button" aria-label="關閉">×</button>
  <button class="lightbox-prev" id="lightbox-prev" type="button" aria-label="前">‹</button>
  <button class="lightbox-next" id="lightbox-next" type="button" aria-label="次">›</button>
  <figure class="lightbox-figure">
    <img class="lightbox-img" id="lightbox-img" alt="" />

</div>

<script src="js/photo-data.js"></script>
<script>
  // ── Series definitions (matches photo-data.js theme ids)
  const SERIES = [
    { id: 'harugasumi', jp: '春信',  romaji: 'Shunshin',  en: 'Spring',          zh: '春信',   place: '櫻花季', primary: '#d98aa8' },
    { id: 'aoarashi',   jp: '青嵐',  romaji: 'Aoarashi',  en: 'Summer',          zh: '青嵐',   place: '盛夏', primary: '#5a7a4a' },
    { id: 'kouyou',     jp: '紅葉',  romaji: 'Kōyō',      en: 'Autumn',          zh: '紅葉',   place: '京都・東京', primary: '#c43838' },
    { id: 'yukiakari',  jp: '雪明',  romaji: 'Yukiakari', en: 'Winter',          zh: '雪明',   place: '北海道', primary: '#a0a8ad' },
    { id: 'kaiyou',     jp: '潮騒',  romaji: 'Shiosai',   en: 'Tideline',        zh: '潮聲',   place: '海岸', primary: '#5a7a8a' },
    { id: 'sansui',     jp: '山水',  romaji: 'Sansui',    en: 'Landscape',       zh: '山水',   place: '山海', primary: '#3d5a3f' },
    { id: 'street',     jp: '街',    romaji: 'Machi',     en: 'Street',          zh: '街頭',   place: '台北 ・ 京都', primary: '#1f1f1d' },
    { id: 'xpan',       jp: 'Xpan',  romaji: 'Panoramic', en: 'Xpan ・ 65×24',   zh: 'Xpan',  place: '寬幅', primary: '#7a5a3a' },
    { id: 'ginen',      jp: '銀塩',  romaji: 'Ginen',     en: 'Silver Halide',   zh: '銀鹽',   place: '正片掃描', primary: '#6b6256' },
  ];

  // ── Build per-series photo lists from photoData
  const seriesIndex = {};
  SERIES.forEach(sr => {
    seriesIndex[sr.id] = photoData.filter(p => p.themes && p.themes.includes(sr.id));
  });

  // ── Render 9 series rows, each with horizontal-scroll thumbnails
  function renderRows() {
    const root = document.getElementById('series-rows');
    SERIES.forEach(sr => {
      const photos = seriesIndex[sr.id] || [];
      if (photos.length === 0) return;

      const row = document.createElement('section');
      row.className = 'series-row';
      row.dataset.seriesId = sr.id;

      const head = document.createElement('div');
      head.className = 'series-row-head';
      head.innerHTML = `
        <div class="series-row-title">
          <span class="series-row-jp">${sr.jp}</span>
          <span class="series-row-en">${sr.romaji} · ${sr.en}</span>
        </div>
        <div class="series-row-meta"><span class="count-num">${photos.length}</span>枚<span class="place">${sr.place}</span></div>
      `;

      const scroll = document.createElement('div');
      scroll.className = 'series-row-scroll';
      photos.forEach((p, i) => {
        const t = document.createElement('button');
        t.className = 'thumb';
        t.type = 'button';
        const alt = p.title_zh || p.title_jp || ('No.' + p.num);
        t.innerHTML = `<img src="${p.src}" alt="${alt}" loading="lazy"><span class="thumb-num">No.${p.num}</span>`;
        t.addEventListener('click', () => openBook(sr.id, i));
        scroll.appendChild(t);
      });

      row.appendChild(head);
      row.appendChild(scroll);
      root.appendChild(row);
    });
  }

  renderRows();

  // ── Lightbox
  // Classic lightbox
  let lbState = null; // { sr, photos, idx }
  let isFlipping = false;
  const lbEl = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbCap = document.getElementById('lightbox-caption');
  const lbCounter = document.getElementById('lightbox-counter');

  // Rebind: series cards open lightbox instead of book
  function openBook(seriesId, idx = 0) {
    const sr = SERIES.find(s => s.id === seriesId);
    const photos = seriesIndex[seriesId] || [];
    if (!sr || photos.length === 0) return;
    lbState = { sr, photos, idx };
    document.body.classList.add('is-book-open');
    lbEl.classList.add('is-open');
    lbEl.setAttribute('aria-hidden', 'false');
    renderLb();
  }
  function closeLb() {
    lbState = null;
    document.body.classList.remove('is-book-open');
    lbEl.classList.remove('is-open');
    lbEl.setAttribute('aria-hidden', 'true');
  }
  function nextLb() {
    if (!lbState || isFlipping) return;
    if (lbState.idx < lbState.photos.length - 1) flipTo(lbState.idx + 1);
  }
  function prevLb() {
    if (!lbState || isFlipping) return;
    if (lbState.idx > 0) flipTo(lbState.idx - 1);
  }
  function flipTo(newIdx) {
    isFlipping = true;
    lbImg.classList.add('is-flipping');
    setTimeout(() => {
      lbState.idx = newIdx;
      renderLb();
      lbImg.classList.remove('is-flipping');
      isFlipping = false;
    }, 250);
  }
  function renderLb() {
    const { sr, photos, idx } = lbState;
    const photo = photos[idx];
    lbImg.src = photo.src;
    lbImg.alt = photo.title_zh || ('No. ' + photo.num);
    const titleZh = photo.title_zh || photo.title_jp || '';
    const titleJp = photo.title_jp || '';
    const haikuJp = (photo.haiku_jp || '').replace(/[／\/]\s*/g, '<br>');
    const haikuZh = (photo.haiku_zh || '').replace(/[／\/]\s*/g, '<br>');
    let html = '';
    if (titleZh) html += `<div class="lb-title">No. ${photo.num} ・ ${titleZh}${titleJp && titleJp !== titleZh ? `<span class="romaji">${titleJp}</span>` : ''}</div>`;
    if (haikuJp) html += `<div class="lb-haiku-jp">${haikuJp}</div>`;
    if (haikuZh) html += `<div class="lb-haiku-zh">${haikuZh}</div>`;
    lbCap.innerHTML = html;
    lbCounter.textContent = `${sr.jp} ・ ${String(idx + 1).padStart(3, '0')} / ${String(photos.length).padStart(3, '0')}`;
  }
  document.getElementById('lightbox-close').addEventListener('click', closeLb);
  document.getElementById('lightbox-prev').addEventListener('click', e => { e.stopPropagation(); prevLb(); });
  document.getElementById('lightbox-next').addEventListener('click', e => { e.stopPropagation(); nextLb(); });
  lbEl.addEventListener('click', e => { if (e.target === lbEl) closeLb(); });
  document.querySelector('.lightbox-figure').addEventListener('click', e => e.stopPropagation());
  document.addEventListener('keydown', e => {
    if (!lbState) return;
    if (e.key === 'Escape') closeLb();
    else if (e.key === 'ArrowRight') nextLb();
    else if (e.key === 'ArrowLeft') prevLb();
  });
</script>

</body>
